yamlname: Monthly vessel list update

on:
  schedule:
    - cron: "0 9 3 * *"
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r scraper/requirements.txt
      - name: Run scraper
        run: python scraper/scraper.py
      - name: Commit updated data
        run: |
          git config user.name "msc-tracking-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/data scraper/fisheries.json
          git diff --cached --quiet || git commit -m "Monthly vessel list update $(date -u +%Y-%m-%d)"
          git push

  deploy-pages:
    needs: scrape
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: "docs"
      - id: deployment
        uses: actions/deploy-pages@v4